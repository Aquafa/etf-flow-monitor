name: Update ETF flow data

on:
  schedule:
    # Farside publishes after US market close; run a few times a day (UTC)
    - cron: "30 1,7,13,19 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Scrape Farside crypto ETF data
        run: python scripts/scrape.py
      - name: Scrape Trackinsight stock ETF data
        run: python scripts/scrape_stocks.py
        continue-on-error: true
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git diff --cached --quiet || (git commit -m "chore: update ETF flow data" && git push)
